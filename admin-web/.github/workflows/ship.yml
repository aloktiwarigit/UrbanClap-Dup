name: ship

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: lint
        run: pnpm lint

      - name: unit tests + coverage
        run: pnpm test:coverage

      - name: coverage gate (≥80%)
        run: |
          COVERAGE=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          echo "Lines coverage: $COVERAGE"
          if awk -v c="$COVERAGE" 'BEGIN {exit !(c < 80)}'; then
            echo "::error::Coverage $COVERAGE%% below 80%% threshold"
            exit 1
          fi

      - name: build
        run: pnpm build

      - name: semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/ci
            p/typescript
            p/react
            p/owasp-top-ten
            p/secrets

      - name: BMAD artifacts present (non-negotiable)
        run: |
          for f in docs/prd.md docs/architecture.md docs/ux-design.md docs/threat-model.md docs/runbook.md .bmad-readiness-passed; do
            test -f "$f" || { echo "::error::missing required artifact $f"; exit 1; }
          done
          test -n "$(ls docs/adr/*.md 2>/dev/null | grep -v TEMPLATE)" || { echo "::error::no ADRs in docs/adr/"; exit 1; }
          test -n "$(ls docs/stories/*.md 2>/dev/null)" || { echo "::error::no stories in docs/stories/"; exit 1; }

  e2e-and-a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - name: start server
        run: pnpm start &
      - run: npx wait-on http://localhost:3000 --timeout 60000

      - name: playwright e2e
        run: pnpm test:e2e

      - name: axe-core a11y (WCAG AA)
        run: pnpm test:a11y

      - name: lighthouse CI (perf/SEO/best-practices budgets)
        run: pnpm exec lhci autorun

  codex-review-advisory:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: verify .codex-review-passed matches HEAD
        run: |
          if [ ! -f .codex-review-passed ]; then
            echo "::warning::No .codex-review-passed marker — author must run /codex-review-gate locally before merge."
            exit 0
          fi
          MARKER_SHA=$(jq -r .commit .codex-review-passed)
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$MARKER_SHA" != "$HEAD_SHA" ]; then
            echo "::error::Codex review marker is for $MARKER_SHA but HEAD is $HEAD_SHA — re-run /codex-review-gate"
            exit 1
          fi
