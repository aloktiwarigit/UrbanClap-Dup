name: ship

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: [5432:5432]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: BMAD artifacts present
        run: |
          for f in docs/prd.md docs/architecture.md docs/threat-model.md docs/runbook.md .bmad-readiness-passed; do
            test -f "$f" || { echo "::error::missing $f"; exit 1; }
          done

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:coverage
      - run: pnpm audit --audit-level=high || true

      - name: semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/typescript p/owasp-top-ten p/nodejs p/secrets

      - name: codex marker
        if: github.event_name == 'pull_request'
        run: |
          [ -f .codex-review-passed ] && [ "$(jq -r .commit .codex-review-passed)" = "$(git rev-parse HEAD)" ] || { echo "::warning::run /codex-review-gate"; }
