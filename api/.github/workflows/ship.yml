name: ship

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/ship.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/ship.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GIT_SHA: ${{ github.sha }}
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: BMAD artifacts present
        working-directory: ${{ github.workspace }}
        run: |
          for f in docs/prd.md docs/architecture.md docs/threat-model.md docs/runbook.md .bmad-readiness-passed; do
            test -f "$f" || { echo "::error::missing $f"; exit 1; }
          done

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:coverage
      # NOTE: `|| true` kept deliberately for the skeleton (near-zero deps; no audit signal yet).
      # Remove `|| true` once dep count > ~30 — tracked as tech debt in docs/stories/README.md §E01.
      - run: pnpm audit --audit-level=high || true

      - name: semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/typescript p/owasp-top-ten p/nodejs p/secrets

      - name: codex review marker (authoritative gate)
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -f .codex-review-passed ]; then
            echo "::error::.codex-review-passed marker missing — run /codex-review-gate before pushing"
            exit 1
          fi
          MARKER_SHA=$(jq -r .commit .codex-review-passed)
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$MARKER_SHA" != "$HEAD_SHA" ]; then
            echo "::error::.codex-review-passed commit ($MARKER_SHA) does not match HEAD ($HEAD_SHA) — rerun /codex-review-gate"
            exit 1
          fi
          echo "codex-review marker matches HEAD $HEAD_SHA"
