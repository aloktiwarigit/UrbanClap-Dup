name: ship

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: BMAD artifacts present
        run: |
          for f in docs/prd.md docs/architecture.md docs/ux-design.md docs/threat-model.md docs/runbook.md .bmad-readiness-passed; do
            test -f "$f" || { echo "::error::missing $f"; exit 1; }
          done

      - name: ktlint
        run: ./gradlew ktlintCheck

      - name: detekt
        run: ./gradlew detekt

      - name: android lint
        run: ./gradlew lintRelease

      - name: unit tests + coverage (kover)
        run: ./gradlew koverVerify koverXmlReport

      - name: screenshot tests (paparazzi)
        run: ./gradlew verifyPaparazziDebug

      - name: assemble release (R8/ProGuard)
        run: ./gradlew assembleRelease

      - name: semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/kotlin p/ci p/secrets

      - name: codex-review marker verification
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -f .codex-review-passed ]; then
            echo "::warning::run /codex-review-gate locally before merge"; exit 0
          fi
          MARKER=$(jq -r .commit .codex-review-passed)
          [ "$MARKER" = "$(git rev-parse HEAD)" ] || { echo "::error::stale codex marker"; exit 1; }
