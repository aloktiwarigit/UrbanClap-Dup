org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseParallelGC
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.parallel=true

android.useAndroidX=true
android.nonTransitiveRClass=true
android.defaults.buildfeatures.buildconfig=true

kotlin.code.style=official
kotlin.jvm.target.validation.mode=error

# KSP2 (K2 compiler mode) is disabled because Hilt 2.52 + AGP 8.6 + KSP2 has a
# known issue where the Hilt aggregating task generates Hilt_X.java files that
# reference DaggerX_HiltComponents_SingletonC before that class is generated by the
# Dagger root processor, causing a compile error. KSP1 mode does not have this problem.
# Track: https://github.com/google/dagger/issues/4751
# Re-enable when Hilt supports KSP2 + aggregating task without this ordering issue.
ksp.useKSP2=false
hilt.enableAggregatingTask=true
