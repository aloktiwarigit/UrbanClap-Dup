name: api-ship

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-ship.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-ship.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GIT_SHA: ${{ github.sha }}
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: build (clean-room compile check)
        run: pnpm build

      - name: unit + integration tests
        run: pnpm test
        env:
          NODE_ENV: test

      - name: openapi spec is up to date
        run: |
          pnpm run openapi:build
          if ! git diff --exit-code openapi.json; then
            echo "::warning::api/openapi.json regenerated on CI — committing"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add openapi.json
            git commit -m "chore(api): auto-regenerate openapi.json [skip ci]"
            git push
          fi

      - name: openapi spec quality (spectral — contract lint)
        run: pnpm run openapi:lint

      - name: semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          # `uses:` steps don't honor the job's `working-directory: api` default,
          # so the local config path is repo-relative.
          config: |
            p/typescript
            p/owasp-top-ten
            p/nodejs
            p/secrets
            api/.semgrep.yml

  deploy:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    env:
      AZURE_FUNCTIONAPP_NAME: func-homeservices-prod
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: api/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Create production package
        run: |
          set -euo pipefail
          rm -rf .deploy-stage deploy.zip
          mkdir -p .deploy-stage

          cp host.json package.json .deploy-stage/
          cp -R dist .deploy-stage/dist

          # Use npm (not pnpm) to guarantee flat real node_modules — pnpm virtual
          # store creates symlinks that break in WEBSITE_RUN_FROM_PACKAGE zip mounts
          cd .deploy-stage
          npm install --omit=dev --ignore-scripts --no-audit --no-fund
          find . -name '*.map' -delete

          # Verify node_modules has real files (not symlinks)
          node_mod_count=$(find node_modules -type f -name "*.js" | wc -l)
          echo "node_modules JS files: ${node_mod_count}"
          if [ "$node_mod_count" -lt 100 ]; then
            echo "node_modules looks empty or symlink-only — aborting"
            exit 1
          fi

          zip -r -q ../deploy.zip .
          cd ..

          unzip -l deploy.zip host.json package.json 'dist/functions/health.js' \
            'node_modules/@azure/functions/dist/index.js'
          package_size_bytes="$(wc -c < deploy.zip)"
          max_size_bytes=$((950 * 1024 * 1024))
          if [ "$package_size_bytes" -gt "$max_size_bytes" ]; then
            echo "Deployment package is larger than 950MB: ${package_size_bytes} bytes"
            exit 1
          fi
          du -h deploy.zip
      - name: Azure login
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}" \
            --output none
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
      - name: Deploy run-from-package URL
        run: |
          set -euo pipefail

          app_name="${AZURE_FUNCTIONAPP_NAME}"
          subscription_id="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          resource_group="$(az functionapp list --query "[?name=='${app_name}'].resourceGroup | [0]" -o tsv)"
          if [ -z "$resource_group" ] || [ "$resource_group" = "null" ]; then
            echo "Could not find resource group for ${app_name}"
            exit 1
          fi

          storage_connection="$(az functionapp config appsettings list \
            --name "$app_name" \
            --resource-group "$resource_group" \
            --query "[?name=='AzureWebJobsStorage'].value | [0]" \
            -o tsv)"
          if [ -z "$storage_connection" ] || [ "$storage_connection" = "null" ]; then
            echo "AzureWebJobsStorage is not configured for ${app_name}"
            exit 1
          fi

          storage_account="$(printf '%s' "$storage_connection" | tr ';' '\n' | awk -F= '$1 == "AccountName" { print $2; exit }')"
          endpoint_suffix="$(printf '%s' "$storage_connection" | tr ';' '\n' | awk -F= '$1 == "EndpointSuffix" { print $2; exit }')"
          if [ -z "$storage_account" ]; then
            echo "Could not parse storage account from AzureWebJobsStorage"
            exit 1
          fi
          if [ -z "$endpoint_suffix" ]; then
            endpoint_suffix="core.windows.net"
          fi

          container_name="function-packages"
          blob_name="${app_name}/${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}.zip"
          expiry="$(date -u -d '+2 years' '+%Y-%m-%dT%H:%MZ')"

          AZURE_STORAGE_CONNECTION_STRING="$storage_connection" \
            az storage container create \
              --name "$container_name" \
              --public-access off \
              --output none

          AZURE_STORAGE_CONNECTION_STRING="$storage_connection" \
            az storage blob upload \
              --container-name "$container_name" \
              --name "$blob_name" \
              --file deploy.zip \
              --overwrite true \
              --output none

          sas_token="$(AZURE_STORAGE_CONNECTION_STRING="$storage_connection" \
            az storage blob generate-sas \
              --container-name "$container_name" \
              --name "$blob_name" \
              --permissions r \
              --expiry "$expiry" \
              -o tsv)"
          package_url="https://${storage_account}.blob.${endpoint_suffix}/${container_name}/${blob_name}?${sas_token}"

          az functionapp config appsettings set \
            --name "$app_name" \
            --resource-group "$resource_group" \
            --settings \
              WEBSITE_RUN_FROM_PACKAGE="$package_url" \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              NODE_ENV=production \
              GIT_SHA="${GITHUB_SHA}" \
            --output none

          az functionapp restart \
            --name "$app_name" \
            --resource-group "$resource_group" \
            --output none

          az rest \
            --method post \
            --url "https://management.azure.com/subscriptions/${subscription_id}/resourceGroups/${resource_group}/providers/Microsoft.Web/sites/${app_name}/syncfunctiontriggers?api-version=2016-08-01" \
            --output none
      - name: Verify health endpoint
        run: |
          set -euo pipefail

          health_url="https://${AZURE_FUNCTIONAPP_NAME}.azurewebsites.net/api/v1/health"
          for attempt in $(seq 1 36); do
            status_code="$(curl -sS -o /tmp/api-health.json -w '%{http_code}' "$health_url" || true)"
            if [ "$status_code" = "200" ]; then
              cat /tmp/api-health.json
              exit 0
            fi
            echo "Health check attempt ${attempt}/36 returned ${status_code}; retrying..."
            sleep 10
          done

          echo "Health endpoint did not return 200."
          cat /tmp/api-health.json || true
          exit 1
