name: api-ship

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-ship.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-ship.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GIT_SHA: ${{ github.sha }}
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: build (clean-room compile check)
        run: pnpm build

      - name: openapi spec is up to date
        run: |
          pnpm run openapi:build
          if ! git diff --exit-code openapi.json; then
            echo "::error::api/openapi.json is stale — run 'pnpm -C api openapi:build' and commit the result (story E01-S06)"
            exit 1
          fi

      - name: openapi spec quality (spectral — contract lint)
        run: pnpm run openapi:lint

