name: api-ship

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-ship.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-ship.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GIT_SHA: ${{ github.sha }}
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: build (clean-room compile check)
        run: pnpm build

      - name: unit + integration tests
        run: pnpm test
        env:
          NODE_ENV: test

      - name: openapi spec is up to date
        run: |
          pnpm run openapi:build
          if ! git diff --exit-code openapi.json; then
            echo "::error::api/openapi.json is stale — run 'pnpm -C api openapi:build' and commit the result (story E01-S06)"
            exit 1
          fi

      - name: openapi spec quality (spectral — contract lint)
        run: pnpm run openapi:lint

      - name: semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          # `uses:` steps don't honor the job's `working-directory: api` default,
          # so the local config path is repo-relative.
          config: |
            p/typescript
            p/owasp-top-ten
            p/nodejs
            p/secrets
            api/.semgrep.yml

  deploy:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: api/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-homeservices-prod
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

