name: api-ship

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-ship.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-ship.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GIT_SHA: ${{ github.sha }}
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: build (clean-room compile check)
        run: pnpm build

      - name: unit + integration tests
        run: pnpm test
        env:
          NODE_ENV: test

      - name: openapi spec is up to date
        run: |
          pnpm run openapi:build
          if ! git diff --exit-code openapi.json; then
            echo "::warning::api/openapi.json regenerated on CI — committing"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add openapi.json
            git commit -m "chore(api): auto-regenerate openapi.json [skip ci]"
            git push
          fi

      - name: openapi spec quality (spectral — contract lint)
        run: pnpm run openapi:lint

      - name: semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          # `uses:` steps don't honor the job's `working-directory: api` default,
          # so the local config path is repo-relative.
          config: |
            p/typescript
            p/owasp-top-ten
            p/nodejs
            p/secrets
            api/.semgrep.yml

  deploy:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: api/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true
      - name: Deploy to Azure Functions
        run: func azure functionapp publish func-homeservices-prod --no-build
        continue-on-error: true
      - name: Verify deployment (wait for cold start)
        run: |
          echo "Waiting 90s for host cold start..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://func-homeservices-prod.azurewebsites.net/api/v1/health)
          echo "Health: HTTP $STATUS"
          [ "$STATUS" = "200" ]

