name: paparazzi-record

# Manually-triggered workflow that runs ./gradlew :<module>:recordPaparazziDebug on the
# Linux CI runner and uploads the recorded snapshots/ directory as an artifact.
#
# Why: Paparazzi renders via layoutlib which is host-OS-sensitive for text antialiasing.
# Windows-recorded goldens DIVERGE from Linux CI renders by ~3-5% — well above Paparazzi's
# default 0.1% threshold. Recording on CI is the correct source of goldens; local recording
# produces flaky CI runs or forces loose maxPercentDifference overrides.
#
# Usage:
#   gh workflow run paparazzi-record.yml -f module=app -f working_directory=customer-app
#   (or via GitHub UI: Actions → paparazzi-record → Run workflow)
#
# After the run completes:
#   1. Download the "<module>-paparazzi-snapshots" artifact from the Actions tab.
#   2. Unzip into `<working_directory>/<module>/src/test/snapshots/images/` (replacing existing).
#   3. Commit the new goldens.
#   4. Push — next `verifyPaparazziDebug` run passes at the strict 0.1% default.
#
# Valid (module, working_directory) pairs in this repo:
#   - (app, customer-app)    — customer-app SmokeScreen etc.
#   - (app, technician-app)  — technician-app SmokeScreen etc.
#   - (design-system, .)     — design-system TokenGallery (single-module composite)

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Gradle module to record (e.g. "app", "design-system")'
        required: true
        default: 'app'
      working_directory:
        description: 'Gradle root directory (e.g. "customer-app", "technician-app", or "." for root)'
        required: true
        default: 'customer-app'

concurrency:
  group: ${{ github.workflow }}-${{ inputs.working_directory }}-${{ inputs.module }}
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: record Paparazzi snapshots
        run: ./gradlew :${{ inputs.module }}:recordPaparazziDebug

      - name: upload recorded snapshots
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.module }}-paparazzi-snapshots
          path: |
            ${{ inputs.working_directory }}/${{ inputs.module }}/src/test/snapshots/**
          if-no-files-found: error
          retention-days: 7
