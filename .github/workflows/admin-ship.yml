name: admin-ship

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'admin-web/**'
      - '.github/workflows/admin-ship.yml'
      # The e2e job boots api/ via playwright webServer, so api runtime
      # changes must re-trigger this workflow (story E01-S06).
      - 'api/openapi.json'
      - 'api/src/**'
      - 'api/package.json'
      - 'api/pnpm-lock.yaml'
      - 'api/tsconfig.json'
      - 'api/host.json'
  push:
    branches: [main]
    paths:
      - 'admin-web/**'
      - '.github/workflows/admin-ship.yml'
      - 'api/openapi.json'
      - 'api/src/**'
      - 'api/package.json'
      - 'api/pnpm-lock.yaml'
      - 'api/tsconfig.json'
      - 'api/host.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    defaults:
      run:
        working-directory: admin-web
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: admin-web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # Gate split: this step only checks admin-web/src/api/generated/** drift.
      # Spec drift (api/openapi.json vs api/src/schemas/**) is gated by
      # api-ship.yml — which triggers on api/ changes, and any api change also
      # triggers this workflow (see paths above), so both gates fire together.
      - name: generated api client is up to date
        run: |
          pnpm run openapi:client
          if ! git diff --exit-code src/api/generated/; then
            echo "::error::admin-web/src/api/generated/ is stale — run 'pnpm -C admin-web openapi:client' and commit the result (story E01-S06)"
            exit 1
          fi

      - name: typecheck + unit tests
        run: pnpm typecheck && pnpm test

      - name: build (clean-room compile check)
        run: pnpm build

      - name: semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/typescript p/react p/owasp-top-ten p/secrets

  e2e-and-a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push'
    needs: quality-gate
    defaults:
      run:
        working-directory: admin-web
    env:
      NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
      GIT_SHA: ${{ github.sha }}
      # Dummy Firebase config for e2e — Firebase SDK throws auth/invalid-api-key
      # before making any network request when apiKey is empty, which prevents
      # Playwright's page.route('**/identitytoolkit.googleapis.com/**') from firing.
      # These values are not real credentials; all Firebase calls are intercepted
      # by Playwright route mocks in tests/e2e/. Must be at job level (not step
      # level) because Next.js bakes NEXT_PUBLIC_* at pnpm build time.
      NEXT_PUBLIC_FIREBASE_API_KEY: "test-api-key-for-e2e-placeholder"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "test-project-e2e.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "test-project-e2e"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            admin-web/pnpm-lock.yaml
            api/pnpm-lock.yaml
      - name: install admin-web deps
        run: pnpm install --frozen-lockfile
      - name: install api deps (for playwright webServer — story E01-S06)
        working-directory: api
        run: pnpm install --frozen-lockfile
      - name: build api (for func start in playwright webServer)
        working-directory: api
        run: pnpm build
      - name: cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('admin-web/pnpm-lock.yaml') }}
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - name: playwright e2e
        run: pnpm test:e2e
      - name: axe-core a11y (WCAG AA)
        run: pnpm test:a11y
      - name: lighthouse CI budgets
        run: pnpm exec lhci autorun --config=lighthouserc.cjs

  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality-gate, e2e-and-a11y]
    # Production deploy on main push or manual dispatch only.
    # PR previews are intentionally NOT auto-deployed — keeps Free-tier env
    # surface small and avoids leaking pre-merge UI to the public SWA URL.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Deploy via Azure Static Web Apps action (Oryx builds Next.js)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: admin-web
          api_location: ''
          output_location: ''
        env:
          # NEXT_PUBLIC_* are baked at build time by Oryx inside the SWA action
          # container. Server-only secrets (JWT_SECRET, etc.) live in SWA app
          # settings — set via `az staticwebapp appsettings set` (see runbook §5.1).
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_APP_URL: ${{ vars.ADMIN_WEB_PUBLIC_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
