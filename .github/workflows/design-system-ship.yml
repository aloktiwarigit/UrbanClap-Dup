name: design-system-ship

on:
  pull_request:
    branches: [main]
    paths:
      - 'design-system/**'
      - 'figma/**'
      - 'TOKEN-SYNC.md'
      - 'tools/check-shared-versions.sh'
      - 'tools/check-token-drift.py'
      - 'tools/tests/**'
      - '.github/workflows/design-system-ship.yml'
  push:
    branches: [main]
    paths:
      - 'design-system/**'
      - 'figma/**'
      - 'TOKEN-SYNC.md'
      - 'tools/check-shared-versions.sh'
      - 'tools/check-token-drift.py'
      - 'tools/tests/**'
      - '.github/workflows/design-system-ship.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GIT_SHA: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: design-system

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: shared toolchain versions drift check
        working-directory: ${{ github.workspace }}
        run: bash tools/check-shared-versions.sh

      - name: token drift check (Kotlin design-system <-> Figma Variables JSON)
        working-directory: ${{ github.workspace }}
        run: python3 tools/check-token-drift.py

      - name: token drift tests
        working-directory: ${{ github.workspace }}
        run: |
          pip install pytest --quiet
          python3 -m pytest tools/tests/test_check_token_drift.py -v

      - name: assemble release AAR (clean-room compile check)
        run: ./gradlew assembleRelease

      - name: paparazzi screenshot diff
        run: ./gradlew verifyPaparazziDebug

      - name: semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/kotlin p/owasp-top-ten p/secrets

